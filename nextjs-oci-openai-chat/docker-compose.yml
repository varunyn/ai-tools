services:
  backend:
    image: nextjs-oci-openai-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    environment:
      - OCI_CONFIG_FILE=/app/oci-config
    volumes:
      # Mount OCI config (copy from ~/.oci/config to backend/oci-config). App reads /app/oci-config.
      # In backend/oci-config set key_file=/app/oci_api_key.pem (container path).
      - ./backend/oci-config:/app/oci-config
      # Mount OCI API key: set OCI_KEY_FILE in .env (this folder, next to docker-compose.yml) to your key path on the host.
      # When unset, /dev/null is mounted so compose doesn't fail (backend will fail until you set OCI_KEY_FILE).
      - ${OCI_KEY_FILE:-/dev/null}:/app/oci_api_key.pem

  frontend:
    image: nextjs-oci-openai-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3040:3000"
    environment:
      - FASTAPI_BACKEND_URL=http://backend:3001
    depends_on:
      - backend

networks:
  open-webui-network:
    external: true
